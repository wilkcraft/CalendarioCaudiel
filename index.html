<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendario Caudiel 2025-2026</title>
    <style>
      body {
        font-family: "Arial", sans-serif;
        background: #fce4ec;
        padding: 20px;
        margin: 0;
        color: #5d5d5d;
      }

      header {
        position: relative;
        text-align: center;
        margin-bottom: 20px;
      }

      header .login-btn {
        position: absolute;
        top: 0;
        right: 0;
      }

      h1 {
        color: #d81b60;
        font-size: 2.5em;
        margin-bottom: 20px;
      }

      .login-btn {
        padding: 10px 20px;
        background-color: #d81b60;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 1em;
        cursor: pointer;
        transition: background-color 0.3s;
      }

      .login-btn:hover {
        background-color: #f50057;
      }

      .login-form {
        position: absolute;
        top: 70px;
        right: 20px;
        background: #ffffff;
        border: 2px solid #f8bbd0;
        border-radius: 10px;
        padding: 15px;
        display: none;
        z-index: 100;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
      }

      .login-form input {
        display: block;
        margin-bottom: 10px;
        padding: 10px;
        width: 200px;
        font-size: 1em;
        border: 1px solid #ccc;
        border-radius: 5px;
      }

      .login-form button {
        width: 100%;
        padding: 10px;
        background-color: #d81b60;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1em;
        cursor: pointer;
      }

      .login-form button:hover {
        background-color: #f50057;
      }

      .navegacion {
        display: flex;
        justify-content: center;
        margin-bottom: 20px;
      }

      .navegacion button {
        padding: 12px 24px;
        font-size: 1.2em;
        cursor: pointer;
        background-color: #ff80ab;
        color: white;
        border: none;
        border-radius: 12px;
        margin: 0 10px;
        transition: background-color 0.3s;
      }

      .navegacion button:hover {
        background-color: #f50057;
      }

      .calendario-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 20px;
      }

      .calendario {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 10px;
        width: 90%;
        max-width: 1200px;
        background-color: #fff5f8;
        border: 2px solid #f8bbd0;
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        box-sizing: border-box;
      }

      .calendario h2 {
        grid-column: span 7;
        text-align: center;
        font-size: 1.8em;
        color: #d81b60;
      }

      .calendario .dia {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 15px;
        min-height: 100px;
        border: 2px solid #f8bbd0;
        border-radius: 8px;
        background-color: #fff;
      }

      .numero {
        font-weight: bold;
        font-size: 1.5em;
        color: #d81b60;
        margin-bottom: 5px;
      }

      .nota {
        font-size: 1em;
        color: #555;
        text-align: center;
        height: 40px;
        overflow: hidden;
        font-style: italic;
      }

      @media (max-width: 600px) {
        .calendario {
          grid-template-columns: repeat(5, 1fr);
        }
        .calendario h2 {
          font-size: 1.5em;
        }
        .numero {
          font-size: 1.2em;
        }
      }

      @media (max-width: 400px) {
        .calendario {
          grid-template-columns: repeat(4, 1fr);
        }
        .calendario h2 {
          font-size: 1.2em;
        }
        .numero {
          font-size: 1em;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Calendario Caudiel 2025-2026</h1>
      <button class="login-btn" onclick="toggleLoginForm()">Log In</button>
    </header>

    <!-- Formulario de Login -->
    <div class="login-form" id="loginForm">
      <input type="text" id="username" placeholder="Usuario" />
      <input type="password" id="password" placeholder="Contraseña" />
      <button onclick="login()">Entrar</button>
    </div>

    <div class="navegacion">
      <button id="btn-anterior">Anterior</button>
      <button id="btn-siguiente">Siguiente</button>
    </div>

    <div class="calendario-container" id="calendarios"></div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
      import {
        getFirestore,
        doc,
        getDoc,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBp-39_WdV6uQ02mvMHu4ORLXFc96RTaOM",
        authDomain: "calendariocaudiel.firebaseapp.com",
        projectId: "calendariocaudiel",
        storageBucket: "calendariocaudiel.firebasestorage.app",
        messagingSenderId: "780740498474",
        appId: "1:780740498474:web:d741fd88bc94f926685f53",
        measurementId: "G-PH31VFY827",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      const calendarios = document.getElementById("calendarios");
      let today = new Date();
      let currentYear = today.getFullYear();
      let currentMonth = today.getMonth(); // Esto carga el mes actual

      const meses = [
        "Enero",
        "Febrero",
        "Marzo",
        "Abril",
        "Mayo",
        "Junio",
        "Julio",
        "Agosto",
        "Septiembre",
        "Octubre",
        "Noviembre",
        "Diciembre",
      ];

      async function crearCalendario(year, month) {
        const diasEnMes = new Date(year, month + 1, 0).getDate();
        let primerDia = new Date(year, month, 1).getDay();
        primerDia = primerDia === 0 ? 6 : primerDia - 1;

        calendarios.innerHTML = "";

        const calendario = document.createElement("div");
        calendario.classList.add("calendario");

        const titulo = document.createElement("h2");
        titulo.textContent = `${meses[month]} ${year}`;
        calendario.appendChild(titulo);

        const diasSemana = ["Lun", "Mar", "Mié", "Jue", "Vie", "Sáb", "Dom"];
        diasSemana.forEach((dia) => {
          const celda = document.createElement("div");
          celda.textContent = dia;
          celda.style.fontWeight = "bold";
          calendario.appendChild(celda);
        });

        for (let i = 0; i < primerDia; i++) {
          calendario.appendChild(document.createElement("div"));
        }

        for (let dia = 1; dia <= diasEnMes; dia++) {
          const celda = document.createElement("div");
          celda.className = "dia";

          const numero = document.createElement("div");
          numero.className = "numero";
          numero.textContent = dia;

          const nota = document.createElement("div");
          nota.className = "nota";
          nota.textContent = "Cargando...";

          celda.appendChild(numero);
          celda.appendChild(nota);

          calendario.appendChild(celda);

          try {
            const docRef = doc(db, `notas${year}${month + 1}`, String(dia));
            const docSnap = await getDoc(docRef);
            nota.textContent = docSnap.exists()
              ? docSnap.data().nota || ""
              : "";
          } catch (error) {
            nota.textContent = "[Error]";
          }
        }

        calendarios.appendChild(calendario);
      }

      document.getElementById("btn-anterior").addEventListener("click", () => {
        currentMonth = currentMonth === 0 ? 11 : currentMonth - 1;
        if (currentMonth === 11) currentYear--;
        crearCalendario(currentYear, currentMonth);
      });

      document.getElementById("btn-siguiente").addEventListener("click", () => {
        currentMonth = currentMonth === 11 ? 0 : currentMonth + 1;
        if (currentMonth === 0) currentYear++;
        crearCalendario(currentYear, currentMonth);
      });

      crearCalendario(currentYear, currentMonth);
    </script>

    <script>
      function toggleLoginForm() {
        const form = document.getElementById("loginForm");
        form.style.display = form.style.display === "block" ? "none" : "block";
      }

      function login() {
        const user = document.getElementById("username").value.trim();
        const pass = document.getElementById("password").value.trim();
        if (user === "CaudielAdmin" && pass === "CaudielAdmin") {
          sessionStorage.setItem("isLoggedIn", "true");
          window.location.href = "admin.html";
        } else {
          alert("Credenciales incorrectas");
        }
      }
    </script>
  </body>
</html>
