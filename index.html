<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendario Julio 2025</title>
    <style>
      body {
        font-family: sans-serif;
        background: #f2f2f2;
        padding: 20px;
      }
      #calendario {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 5px;
        max-width: 700px;
        margin: auto;
      }
      .dia {
        background: white;
        border: 1px solid #ccc;
        padding: 10px;
        cursor: pointer;
        min-height: 80px;
      }
      .numero {
        font-weight: bold;
      }
      .nota {
        font-size: 0.9em;
        margin-top: 5px;
        color: #333;
      }
      .popup {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        padding: 20px;
        box-shadow: 0 0 10px #0003;
        z-index: 10;
        display: none;
      }
      .popup textarea {
        width: 100%;
        height: 100px;
      }
      #overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0, 0, 0, 0.3);
        z-index: 5;
        display: none;
      }
    </style>
  </head>
  <body>
    <h1>Calendario Julio 2025</h1>
    <div id="calendario"></div>

    <!-- Overlay y Popup -->
    <div id="overlay"></div>
    <div class="popup" id="popup">
      <h3 id="titulo-dia">Día</h3>
      <textarea id="input-nota" placeholder="Escribe una nota..."></textarea>
      <button id="btn-guardar">Guardar</button>
      <button onclick="cerrarPopup()">Cerrar</button>
    </div>

    <!-- Firebase + Script -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
      import {
        getFirestore,
        doc,
        getDoc,
        setDoc,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBp-39_WdV6uQ02mvMHu4ORLXFc96RTaOM",
        authDomain: "calendariocaudiel.firebaseapp.com",
        projectId: "calendariocaudiel",
        storageBucket: "calendariocaudiel.firebasestorage.app",
        messagingSenderId: "780740498474",
        appId: "1:780740498474:web:d741fd88bc94f926685f53",
        measurementId: "G-PH31VFY827",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      const calendario = document.getElementById("calendario");
      const popup = document.getElementById("popup");
      const overlay = document.getElementById("overlay");
      const inputNota = document.getElementById("input-nota");
      const tituloDia = document.getElementById("titulo-dia");
      const btnGuardar = document.getElementById("btn-guardar");

      let diaSeleccionado = null;

      async function crearCalendario() {
        const diasEnJulio = 31;
        const primerDia = new Date(2025, 6, 1).getDay(); // 0 = domingo

        const diasSemana = ["Dom", "Lun", "Mar", "Mié", "Jue", "Vie", "Sáb"];
        diasSemana.forEach((dia) => {
          const celda = document.createElement("div");
          celda.textContent = dia;
          celda.style.fontWeight = "bold";
          calendario.appendChild(celda);
        });

        for (let i = 0; i < primerDia; i++) {
          const vacio = document.createElement("div");
          calendario.appendChild(vacio);
        }

        for (let dia = 1; dia <= diasEnJulio; dia++) {
          const celda = document.createElement("div");
          celda.className = "dia";
          celda.dataset.dia = dia;

          const numero = document.createElement("div");
          numero.className = "numero";
          numero.textContent = dia;

          const nota = document.createElement("div");
          nota.className = "nota";
          nota.textContent = "Cargando...";

          celda.appendChild(numero);
          celda.appendChild(nota);

          celda.addEventListener("click", () => abrirPopup(dia, nota));
          calendario.appendChild(celda);

          try {
            const docRef = doc(db, "notasJulio2025", String(dia));
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
              nota.textContent = docSnap.data().nota || "";
            } else {
              nota.textContent = "";
            }
          } catch (error) {
            console.error("Error al leer nota:", error);
            nota.textContent = "[Error]";
          }
        }
      }

      function abrirPopup(dia, notaElemento) {
        diaSeleccionado = dia;
        tituloDia.textContent = `Nota para el día ${dia}`;
        inputNota.value = notaElemento.textContent || "";
        popup.style.display = "block";
        overlay.style.display = "block";
      }

      function cerrarPopup() {
        popup.style.display = "none";
        overlay.style.display = "none";
      }

      async function guardarNota() {
        const notaTexto = inputNota.value.trim();

        try {
          await setDoc(doc(db, "notasJulio2025", String(diaSeleccionado)), {
            nota: notaTexto,
          });

          const celda = document.querySelector(
            `.dia[data-dia="${diaSeleccionado}"] .nota`
          );
          celda.textContent = notaTexto;

          cerrarPopup();
        } catch (error) {
          console.error("Error al guardar en Firestore:", error);
          alert("❌ Error al guardar la nota. Revisa permisos o conexión.");
        }
      }

      btnGuardar.addEventListener("click", guardarNota);
      window.cerrarPopup = cerrarPopup; // Hacemos cerrarPopup global
      crearCalendario();
    </script>
  </body>
</html>
